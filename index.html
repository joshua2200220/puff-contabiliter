<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PuffStock, Caisse & Studio Marketing</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="icon.png">
    <meta name="theme-color" content="#6c5ce7">
    <style>
        :root {
            --primary: #6c5ce7;--bg: #f8f9fa;--text: #2d3436;--card: #ffffff;--danger: #ff7675;--success: #00b894;--secondary: #0984e3;
        }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 0; background-color: var(--bg); color: var(--text); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .container { padding: 15px; max-width: 800px; margin: 0 auto; }
        .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-top: 0; color: var(--primary); font-size: 1.3rem; border-bottom: 2px solid #f1f2f6; padding-bottom: 8px; }
        .form-group { margin-bottom: 12px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        label { display: block; margin-bottom: 5px; font-weight: 500; font-size: 0.9rem; }
        input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; }
        .kpi-box { background: #f1f2f6; padding: 12px; border-radius: 8px; text-align: center; }
        .kpi-val { font-size: 1.4rem; font-weight: bold; margin-top: 5px; }
        .stock-item { background: #fafafa; border: 1px solid #edf2f7; border-radius: 8px; padding: 12px; margin-bottom: 10px; }
        .stock-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .stock-title { font-weight: bold; font-size: 1.1rem; }
        .stock-actions { display: flex; align-items: center; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
        .qty-controls { display: flex; align-items: center; gap: 5px; }
        .btn-qty { width: 35px; padding: 5px; background: #e4e7eb; color: #333; }
        .input-qty { width: 60px; text-align: center; padding: 5px; }
        .btn-sell { background: var(--success); width: auto; padding: 6px 12px; }
        .btn-delete { background: var(--danger); width: auto; padding: 6px 12px; }
        .btn-danger-outline { background: transparent; color: var(--danger); border: 1px solid var(--danger); margin-top: 10px; }
        canvas { max-width: 100%; height: auto; border-radius: 8px; display: none; margin-top: 15px; }
    </style>
</head>
<body>
    <header>💨 PuffStock - Gestion & Studio</header>
    <div class="container">
        <div class="card">
            <h2>💰 Caisse et Comptabilité</h2>
            <div class="kpi-box">
                <label>Solde de la Caisse</label>
                <div class="kpi-val" id="totalVentes" style="color: var(--success);">0.00 €</div>
            </div>
            <div style="background: #fff8f8; padding: 12px; border-radius: 8px; border: 1px solid #ffe3e3; margin-top: 15px;">
                <label><strong>Retirer de l'argent (Achat stock / Paiement)</strong></label>
                <div class="form-row">
                    <input type="number" id="montantRetrait" placeholder="Montant en €">
                    <button onclick="retirerArgent()" style="background: var(--secondary); max-width: 100px;">Retirer</button>
                </div>
                <button class="btn-danger-outline" onclick="remettreAZero()">🔄 Remettre la caisse à 0 €</button>
            </div>
        </div>

        <div class="card">
            <h2>➕ Ajouter une nouvelle Puff</h2>
            <div class="form-row">
                <input type="text" id="newSaveur" placeholder="Ex: Blue Razz Ice">
                <input type="number" id="newPrix" placeholder="Prix de vente (€)" step="0.1">
            </div>
            <input type="number" id="newStock" placeholder="Stock de départ" value="10" style="margin-bottom: 10px;">
            <button onclick="ajouterPuff()">Créer la référence</button>
        </div>

        <div class="card">
            <h2>📦 Inventaire & Ventes</h2>
            <div id="listeStocks"></div>
        </div>

        <div class="card">
            <h2>🎨 Studio Photo Marketing</h2>
            <input type="file" id="imageInput" accept="image/*" style="margin-bottom: 10px;">
            <div class="form-row">
                <input type="color" id="bgColor" value="#6c5ce7">
                <input type="text" id="prixTexte" value="7.00 € l'unité">
            </div>
            <select id="promoTexte" style="margin-bottom: 10px;">
                <option value="🔥 OFFRE FLASH : 3 ACHETÉES = 1 OFFERTE 🔥">3 Achetées = 1 Offerte</option>
                <option value="⚡ PROMO UNIK : -20% SUR TOUT LE STOCK ⚡">Réduction -20%</option>
            </select>
            <button id="btnGenerer">✨ Générer l'image</button>
            <canvas id="marketingCanvas" width="1080" height="1920"></canvas>
            <button id="btnTelecharger" style="margin-top: 15px; display: none; background: #0984e3;">📥 Télécharger l'image</button>
        </div>
    </div>

    <script>
        let stocks = JSON.parse(localStorage.getItem('puff_stocks')) || [];
        let totalVentes = parseFloat(localStorage.getItem('puff_ventes')) || 0;

        function sauvegarder() {
            localStorage.setItem('puff_stocks', JSON.stringify(stocks));
            localStorage.setItem('puff_ventes', totalVentes.toString());
            afficherStocks();
        }

        function afficherStocks() {
            document.getElementById('totalVentes').innerText = totalVentes.toFixed(2) + " €";
            const liste = document.getElementById('listeStocks');
            liste.innerHTML = stocks.length === 0 ? '<p>Aucun produit.</p>' : '';
            stocks.forEach(item => {
                liste.innerHTML += `
                    <div class="stock-item">
                        <div class="stock-header">
                            <div><strong>${item.saveur}</strong> - ${item.prix.toFixed(2)}€</div>
                            <button class="btn-sell" onclick="vendre(${item.id})">🛒 Vendre 1</button>
                        </div>
                        <div class="stock-actions">
                            <div class="qty-controls">
                                <button class="btn-qty" onclick="ajusterStock(${item.id}, -1)">-</button>
                                <input type="number" class="input-qty" value="${item.quantite}" onchange="modifierStockManuel(${item.id}, this.value)">
                                <button class="btn-qty" onclick="ajusterStock(${item.id}, 1)">+</button>
                            </div>
                            <button class="btn-delete" onclick="supprimerPuff(${item.id})">🗑️</button>
                        </div>
                    </div>`;
            });
        }

        function ajouterPuff() {
            const saveur = document.getElementById('newSaveur').value.trim();
            const prix = parseFloat(document.getElementById('newPrix').value);
            const stock = parseInt(document.getElementById('newStock').value) || 0;
            if(!saveur || isNaN(prix)) return alert("Remplir les champs !");
            stocks.push({ id: Date.now(), saveur, quantite: stock, prix });
            sauvegarder();
        }

        function supprimerPuff(id) { stocks = stocks.filter(p => p.id !== id); sauvegarder(); }
        function ajusterStock(id, chg) { const item = stocks.find(p => p.id === id); if(item) { item.quantite = Math.max(0, item.quantite + chg); sauvegarder(); } }
        function modifierStockManuel(id, val) { const item = stocks.find(p => p.id === id); if(item) { item.quantite = Math.max(0, parseInt(val) || 0); sauvegarder(); } }
        function vendre(id) { const item = stocks.find(p => p.id === id); if(item && item.quantite > 0) { item.quantite--; totalVentes += item.prix; sauvegarder(); } }
        function retirerArgent() { const mnt = parseFloat(document.getElementById('montantRetrait').value); if(!isNaN(mnt)) { totalVentes -= mnt; sauvegarder(); } }
        function remettreAZero() { totalVentes = 0; sauvegarder(); }

        const imageInput = document.getElementById('imageInput');
        const canvas = document.getElementById('marketingCanvas');
        const ctx = canvas.getContext('2d');

        document.getElementById('btnGenerer').addEventListener('click', () => {
            if (!imageInput.files[0]) return alert("Importe une image !");
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    ctx.fillStyle = document.getElementById('bgColor').value;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, (canvas.width - 700)/2, (canvas.height - 700)/2, 700, 700);
                    ctx.fillStyle = "#ffffff"; ctx.font = "bold 50px sans-serif"; ctx.textAlign = "center";
                    ctx.fillText(document.getElementById('promoTexte').value, canvas.width / 2, 250);
                    ctx.fillStyle = "#fff200"; ctx.font = "bold 75px sans-serif";
                    ctx.fillText(document.getElementById('prixTexte').value, canvas.width / 2, 1700);
                    canvas.style.display = "block"; document.getElementById('btnTelecharger').style.display = "block";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(imageInput.files[0]);
        });

        document.getElementById('btnTelecharger').addEventListener('click', () => {
            const link = document.createElement('a'); link.download = 'promo.png'; link.href = canvas.toDataURL(); link.click();
        });

        afficherStocks();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
